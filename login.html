<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Login - Travel X</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body{
      height:100vh;

      background:
      linear-gradient(rgba(0,0,0,0.55),
      rgba(0,0,0,0.55)),
      url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=1600&auto=format&fit=crop');

      background-size:cover;
      background-position:center;

      display:flex;
      justify-content:center;
      align-items:center;

      padding:20px;
    }

    .login-box{
      width:100%;
      max-width:420px;

      background:rgba(255,255,255,0.12);
      backdrop-filter:blur(12px);

      padding:45px;
      border-radius:25px;

      box-shadow:0 10px 35px rgba(0,0,0,0.35);

      color:white;
    }

    .logo{
      text-align:center;
      margin-bottom:35px;
    }

    .logo h1{
      font-size:48px;
      letter-spacing:3px;
      margin-bottom:10px;
    }

    .logo p{
      color:#f1f1f1;
      font-size:16px;
    }

    form{
      display:flex;
      flex-direction:column;
      gap:20px;
    }

    .input-box{
      display:flex;
      flex-direction:column;
    }

    .input-box label{
      margin-bottom:8px;
      font-size:15px;
      color:#f5f5f5;
    }

    .input-box input{
      padding:15px;
      border:none;
      border-radius:12px;
      outline:none;
      font-size:16px;
      background:rgba(255,255,255,0.9);
      color:#222;
    }

    .options{
      display:flex;
      justify-content:space-between;
      align-items:center;
      font-size:14px;
      margin-top:-5px;
    }

    .options a{
      color:#ffd089;
      text-decoration:none;
    }

    .options a:hover{
      text-decoration:underline;
    }

    .btn-login{
      margin-top:10px;

      background:#ff7a00;
      color:white;

      border:none;
      padding:16px;
      border-radius:12px;

      font-size:18px;
      font-weight:bold;

      cursor:pointer;
      transition:0.3s;
    }

    .btn-login:hover{
      background:#e56700;
      transform:translateY(-3px);
    }

    .register{
      text-align:center;
      margin-top:25px;
      font-size:15px;
    }

    .register a{
      color:#ffd089;
      text-decoration:none;
      font-weight:bold;
    }

    .register a:hover{
      text-decoration:underline;
    }

    @media(max-width:500px){

      .login-box{
        padding:35px 25px;
      }

      .logo h1{
        font-size:38px;
      }

    }

  </style>
</head>

<body>

  <div class="login-box">

    <div class="logo">

      <h1>Travel X</h1>

      <p>
        Acesse sua conta e explore o mundo
      </p>

    </div>

    <form>

      <div class="input-box">

        <label>E-mail</label>

        <input
          type="email"
          placeholder="Digite seu e-mail"
          required>

      </div>

      <div class="input-box">

        <label>Senha</label>

        <input
          type="password"
          placeholder="Digite sua senha"
          required>

      </div>

      <div class="options">

        <label>
          <input type="checkbox">
          Lembrar-me
        </label>

        <a href="#">
          Esqueceu a senha?
        </a>

      </div>

      <button class="btn-login" type="submit">
        Entrar
      </button>

    </form>

    <div class="register">

      Não possui conta?
      <a href="#">
        Criar conta
      </a>

    </div>

  </div>

</body>
</html>
